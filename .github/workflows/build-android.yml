name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to manually trigger the build from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Build Next.js Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Setup Capacitor Workspace
        working-directory: ./capacitor_app
        run: |
          npm ci || npm install
          mkdir -p web
          # Copy the Next.js static export directly into Capacitor's web folder
          cp -R ../frontend/out/* web/
          npx cap sync android

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android Environment
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        working-directory: ./capacitor_app/android
        run: chmod +x gradlew

      - name: Build Android Debug APK
        working-directory: ./capacitor_app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SJS-School-ERP-Debug-APK
          path: capacitor_app/android/app/build/outputs/apk/debug/app-debug.apk
